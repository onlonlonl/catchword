<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Catchword</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪔</text></svg>">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CATCHWORD">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=LXGW+WenKai+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef4f8; --card: #fafcfe; --border: #7a8f98; --accent: #7BA7BC;
  --accent-dark: #5A8A9F; --cream: #f0f5f8; --text: #3A4A52; --muted: #8A9DA6;
  --light: #d4e5ed; --shadow: #b8cdd6;
  --warm: #E8C170; --warm-light: #FDF8EE; --warm-dark: #C9A550;
  --moon: #7BA7BC; --moon-bg: #edf4f8;
  --bulb: #E8C170; --bulb-bg: #fdf8ee;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DotGothic16', monospace; font-size: 13px;
  min-height: 100vh; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle, var(--light) 1px, transparent 1px);
  background-size: 16px 16px; opacity: .4; pointer-events: none; z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

/* Header */
.header { text-align: center; padding: 28px 16px 12px; border-bottom: 2px dashed var(--shadow); position: relative; }
.header h1 { font-size: 24px; font-weight: 800; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; text-shadow: 2px 2px 0 #ddeaf0; }
.gear { position: absolute; top: 16px; right: 16px; cursor: pointer; opacity: .6; transition: opacity .2s; text-align: center; font-size: 8px; color: var(--muted); }
.gear:hover { opacity: 1; }
.gear-img { width: 28px; height: 28px; image-rendering: pixelated; display: block; margin: 0 auto 2px; }

/* Buttons */
.btn { padding: 10px 20px; border: 2px solid var(--border); background: var(--cream); color: #6a7f88; cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: 2px 2px 0 var(--shadow); transition: all .15s; }
.btn:hover { transform: translateY(-1px); }
.btn.active { background: var(--accent); color: #fff; box-shadow: 3px 3px 0 #5a7a88; }
.btn:disabled { opacity: .5; cursor: default; transform: none; }
.tag-btn { display: inline-block; padding: 4px 10px; font-size: 10px; border: 1.5px solid var(--shadow); background: transparent; color: #6a7f88; cursor: pointer; font-family: inherit; transition: all .15s; }
.tag-btn:hover { border-color: var(--accent); }
.tag-active { border-color: var(--accent); background: var(--light); color: var(--accent-dark); }
.tag-active-bulb { border-color: var(--warm); background: var(--warm-light); color: var(--warm-dark); }
.icon-btn { background: none; border: 2px solid var(--border); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text); box-shadow: 2px 2px 0 var(--shadow); }

/* Setup */
.setup-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.setup-card { background: var(--card); border: 2px solid var(--border); padding: 40px 28px; text-align: center; max-width: 380px; width: 100%; box-shadow: 4px 4px 0 var(--shadow); }
.setup-icon { margin-bottom: 12px; }
.setup-icon img { width: 48px; height: 48px; image-rendering: pixelated; }
.setup-title { font-size: 22px; color: var(--accent); letter-spacing: 4px; margin-bottom: 6px; }
.setup-sub { font-size: 11px; color: var(--muted); margin-bottom: 28px; }
.setup-label { font-size: 12px; text-align: left; margin-bottom: 4px; }
.setup-hint { font-size: 10px; color: var(--muted); text-align: left; margin-bottom: 12px; }
.input { width: 100%; padding: 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 12px; color: var(--text); outline: none; margin-bottom: 10px; }
.input:focus { border-color: var(--accent); }
.setup-err { color: #C75050; font-size: 11px; margin-bottom: 10px; }
.setup-footer { font-size: 10px; color: var(--muted); margin-top: 20px; }
.submit-btn { padding: 12px 24px; border: 2px solid var(--border); background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: 3px 3px 0 #5a7a88; width: 100%; }
.submit-btn:hover:not(:disabled) { transform: translateY(-1px); }
.submit-btn:disabled { opacity: .5; cursor: default; }

/* Bookshelf */
.shelf-actions { display: flex; align-items: center; justify-content: space-between; padding: 16px; flex-wrap: wrap; gap: 12px; }
.icon-switch { display: flex; gap: 4px; }
.icon-option { width: 36px; height: 36px; border: 2px solid var(--shadow); background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0 var(--shadow); }
.icon-option img { width: 24px; height: 24px; image-rendering: pixelated; }
.icon-option.active { border-color: var(--accent); background: var(--light); }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; padding: 0 16px 24px; }
.book-card { background: var(--card); border: 2px solid var(--border); padding: 14px; cursor: pointer; box-shadow: 3px 3px 0 var(--shadow); transition: all .2s; }
.book-card:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 var(--border); }
.book-cover { width: 100%; aspect-ratio: 3/4; border: 1px solid var(--light); display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; overflow: hidden; }
.book-cover-img { width: 100%; height: 100%; object-fit: cover; }
.book-cover-gen { background: linear-gradient(135deg, var(--light), var(--accent) 120%); }
.book-cover-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.25) 1.5px, transparent 1.5px); background-size: 10px 10px; }
.book-cover-title { font-size: 10px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,.3); text-align: center; padding: 0 8px; z-index: 1; word-break: break-all; }
.book-cover-author { font-size: 10px; color: rgba(255,255,255,.7); z-index: 1; margin-top: 4px; }
.book-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; line-height: 1.4; }
.book-card-author { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.book-card-pages { font-size: 10px; color: var(--muted); }
.empty-shelf { text-align: center; padding: 80px 20px; color: var(--muted); }
.loading-text { text-align: center; padding: 60px; font-size: 12px; color: var(--muted); }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; }
.loading-screen img { width: 48px; height: 48px; image-rendering: pixelated; }

/* Reader */
.reader-page { display: flex; flex-direction: column; min-height: 100vh; }
.reader-header { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 2px dashed var(--shadow); flex-shrink: 0; }
.reader-title-area { flex: 1; min-width: 0; }
.reader-book-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reader-page-info { font-size: 10px; color: var(--muted); }
.progress-track { height: 3px; background: var(--light); margin: 0 16px; flex-shrink: 0; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--warm)); transition: width .3s; }
.reader-content { flex: 1; overflow-y: auto; padding: 24px; -webkit-overflow-scrolling: touch; max-width: 720px; margin: 0 auto; width: 100%; }
.paragraph { font-family: 'LXGW WenKai TC', serif; margin: 0 0 12px; color: var(--text); text-align: justify; text-indent: 2em; padding: 4px 6px; cursor: pointer; transition: background .15s; line-height: 1.9; }
.paragraph:hover { background: var(--light); }
.para-selected { background: var(--light); border-left: 3px solid var(--accent); }

/* Annotations */
.ann-section { margin-top: 20px; border-top: 2px dashed var(--shadow); padding-top: 12px; }
.ann-section-title { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 12px; }
.annotation { padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid; }
.ann-moon { background: var(--moon-bg); border-left-color: var(--moon); }
.ann-bulb { background: var(--bulb-bg); border-left-color: var(--bulb); }
.ann-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.ann-author { font-size: 10px; }
.ann-moon .ann-author { color: var(--accent-dark); }
.ann-bulb .ann-author { color: var(--warm-dark); }
.ann-time { font-size: 10px; color: var(--muted); }
.ann-content { font-family: 'LXGW WenKai TC', serif; font-size: 13px; line-height: 1.7; color: var(--text); }
.ann-reply-btn { background: none; border: none; font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 0; font-family: inherit; }
.ann-reply-box { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--light); }
.ann-reply-input { flex: 1; padding: 6px 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 11px; color: var(--text); outline: none; }
.ann-reply-input:focus { border-color: var(--accent); }
.ann-reply-send { padding: 6px 12px; border: 2px solid var(--border); background: var(--accent); color: #fff; cursor: pointer; font-size: 11px; font-family: inherit; box-shadow: 2px 2px 0 #5a7a88; }

/* Reader Input */
.reader-input-area { padding: 10px 16px; border-top: 2px dashed var(--shadow); flex-shrink: 0; background: var(--bg); }
.ann-author-toggle { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
.sel-indicator { font-size: 10px; color: var(--accent); margin-left: 4px; }
.input-row { display: flex; gap: 8px; }
.ann-input { flex: 1; padding: 8px 12px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 12px; color: var(--text); outline: none; }
.ann-input:focus { border-color: var(--accent); }
.send-btn { padding: 8px 14px; border: 2px solid var(--border); background: var(--text); color: #fff; cursor: pointer; font-size: 14px; font-family: inherit; box-shadow: 2px 2px 0 var(--shadow); }

/* Reader Nav */
.reader-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px 16px; flex-shrink: 0; }
.nav-btn { font-family: inherit; font-size: 12px; background: none; border: none; color: var(--muted); cursor: pointer; }
.nav-btn:disabled { opacity: .3; }

/* Settings Modal */
.overlay { position: fixed; inset: 0; background: rgba(58,74,82,.3); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--card); border: 2px solid var(--border); padding: 24px; box-shadow: 6px 6px 0 var(--shadow); max-width: 380px; width: 90%; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 12px; font-weight: 700; margin-bottom: 20px; letter-spacing: 2px; }
.setting-row { margin-bottom: 16px; padding: 12px; background: var(--bg); border: 1px solid var(--light); }
.setting-label { font-size: 10px; color: var(--muted); margin-bottom: 8px; display: block; }
.setting-name-row { display: flex; align-items: center; gap: 10px; }
.setting-emoji { font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border); background: var(--cream); }
.setting-input { flex: 1; padding: 8px 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 12px; color: var(--text); outline: none; }
.setting-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

/* Footer */
.footer { text-align: center; padding: 24px; font-size: 10px; color: var(--muted); letter-spacing: 2px; border-top: 1px dashed var(--light); }

@media (max-width: 600px) {
  .book-grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px 20px; }
  .header h1 { font-size: 18px; }
  .reader-content { padding: 16px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin></script>
<script src="app.js"></script>
</body>
</html>
