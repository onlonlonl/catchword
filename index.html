<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CATCHWORD</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪔</text></svg>">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CATCHWORD">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=LXGW+WenKai+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Variables ── */
:root {
  --bg: #EFF5F8;
  --card: #FFFFFF;
  --border: #B8CDD6;
  --border-light: #D4E5ED;
  --blue: #7BA7BC;
  --blue-light: #D4E5ED;
  --blue-dark: #5A8A9F;
  --warm: #E8C170;
  --warm-light: #FDF5E6;
  --text: #3A4A52;
  --text-light: #8A9DA6;
  --moon-bg: #EDF4F8;
  --moon-border: #7BA7BC;
  --bulb-bg: #FDF8EE;
  --bulb-border: #E8C170;
  --pixel: 'Press Start 2P', monospace;
  --reading: 'LXGW WenKai TC', serif;
}

body {
  font-family: var(--reading);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 540px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ── Pixel Text ── */
.pixel-title {
  font-family: var(--pixel);
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--blue);
}
.pixel-text {
  font-family: var(--pixel);
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--text-light);
}

/* ── Buttons ── */
.btn-primary {
  font-family: var(--pixel);
  font-size: 10px;
  background: var(--blue);
  color: #fff;
  border: 2px solid var(--blue-dark);
  border-radius: 4px;
  padding: 12px 28px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.btn-primary:hover { background: var(--blue-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: default; }

.icon-btn {
  background: none;
  border: 2px solid var(--border);
  border-radius: 4px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--text);
}

.tag-btn {
  font-family: var(--pixel);
  font-size: 8px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  cursor: pointer;
  color: var(--text-light);
  transition: all 0.15s;
}
.tag-btn:hover { border-color: var(--blue); }
.tag-active {
  background: var(--blue-light);
  border-color: var(--blue);
  color: var(--blue-dark);
}
.tag-active-bulb {
  background: var(--warm-light);
  border-color: var(--warm);
  color: #B8942A;
}

/* ── Decorations ── */
.shelf-divider {
  border-top: 2px dashed var(--border);
  margin: 0 16px;
}

/* ── Dots pattern ── */
.dots-bg {
  background-image: radial-gradient(var(--border-light) 1px, transparent 1px);
  background-size: 16px 16px;
}

/* ── Setup Page ── */
.setup-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.setup-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 40px 28px;
  text-align: center;
  max-width: 360px;
  width: 100%;
}
.setup-icon { font-size: 36px; margin-bottom: 16px; }
.setup-title { margin-bottom: 8px; }
.setup-sub { margin-bottom: 28px; }
.setup-label {
  font-size: 14px;
  text-align: left;
  margin-bottom: 4px;
}
.setup-hint {
  font-size: 12px;
  color: var(--text-light);
  text-align: left;
  margin-bottom: 12px;
}
.setup-input {
  width: 100%;
  font-family: var(--reading);
  font-size: 14px;
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 16px;
  outline: none;
  color: var(--text);
  background: var(--bg);
}
.setup-input:focus { border-color: var(--blue); }
.setup-err { color: #C75050; font-size: 12px; margin-bottom: 12px; }
.setup-footer { font-size: 11px; color: var(--text-light); margin-top: 20px; }

/* ── Bookshelf ── */
.bookshelf-page { padding-bottom: 24px; }
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}
.header-center { text-align: center; }
.main-icon { font-size: 28px; margin-bottom: 4px; }
.settings-btn { font-size: 14px; }

.shelf-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}
.upload-btn { font-size: 9px; padding: 10px 16px; }
.icon-switch {
  display: flex;
  gap: 4px;
}
.icon-option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 4px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
}
.icon-active {
  border-color: var(--blue);
  background: var(--blue-light);
}

.book-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 0 16px;
}
.book-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.book-card:hover { border-color: var(--blue); transform: translateY(-2px); }
.book-cover {
  width: 100%;
  aspect-ratio: 3/4;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
  border: 1px solid var(--border-light);
}
.book-cover-img { width: 100%; height: 100%; object-fit: cover; }
.book-cover-gen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
.book-cover-dots {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.3) 1.5px, transparent 1.5px);
  background-size: 12px 12px;
}
.book-cover-title {
  font-size: 8px;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  text-align: center;
  padding: 0 8px;
  z-index: 1;
  word-break: break-all;
}
.book-cover-author {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  z-index: 1;
  margin-top: 4px;
}
.book-card-title {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 2px;
}
.book-card-author {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 4px;
}
.book-card-pages { font-size: 7px; }

.empty-shelf {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-shelf .pixel-text { margin-bottom: 8px; font-size: 10px; }
.loading-text { text-align: center; padding: 40px; font-size: 10px; }
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 12px;
}

/* ── Reader ── */
.reader-page {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.reader-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  flex-shrink: 0;
}
.reader-title-area { flex: 1; min-width: 0; }
.reader-book-title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.reader-page-info { font-size: 8px; }

.progress-track {
  height: 3px;
  background: var(--border-light);
  margin: 0 16px;
  border-radius: 2px;
  flex-shrink: 0;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--warm));
  border-radius: 2px;
  transition: width 0.3s;
}

.reader-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 12px;
  -webkit-overflow-scrolling: touch;
}
.page-text { line-height: 1.9; }
.paragraph {
  margin: 0 0 10px;
  color: var(--text);
  text-align: justify;
  text-indent: 2em;
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}
.paragraph:hover { background: var(--blue-light); }
.para-selected {
  background: var(--blue-light);
  border-left: 3px solid var(--blue);
}

/* ── Annotations ── */
.annotations-section { margin-top: 20px; }
.ann-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.ann-divider::after {
  content: "";
  flex: 1;
  border-top: 2px dashed var(--border);
}
.ann-divider-text { font-size: 8px; white-space: nowrap; }

.annotation {
  padding: 10px 12px;
  border-radius: 6px;
  margin-bottom: 8px;
  border-left: 3px solid;
}
.ann-moon {
  background: var(--moon-bg);
  border-left-color: var(--moon-border);
}
.ann-bulb {
  background: var(--bulb-bg);
  border-left-color: var(--bulb-border);
}
.ann-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.ann-author {
  font-family: var(--pixel);
  font-size: 8px;
  color: var(--text-light);
}
.ann-moon .ann-author { color: var(--blue); }
.ann-bulb .ann-author { color: #B8942A; }
.ann-time { font-size: 11px; color: var(--text-light); }
.ann-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}
.ann-actions { margin-top: 4px; }
.ann-reply-btn {
  background: none;
  border: none;
  font-size: 12px;
  color: var(--text-light);
  cursor: pointer;
  padding: 2px 0;
}
.ann-reply-btn:hover { color: var(--blue); }

.ann-reply-box {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border-light);
}
.ann-reply-author-toggle { display: flex; gap: 4px; }
.ann-reply-input {
  flex: 1;
  font-family: var(--reading);
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  outline: none;
  background: var(--card);
  color: var(--text);
}
.ann-reply-input:focus { border-color: var(--blue); }
.ann-reply-send {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 4px;
  width: 30px;
  height: 30px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Reader Input Area ── */
.reader-input-area {
  padding: 8px 16px;
  border-top: 2px dashed var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.ann-author-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  align-items: center;
}
.sel-indicator { color: var(--blue); margin-left: 4px; }
.input-row { display: flex; gap: 8px; }
.ann-input {
  flex: 1;
  font-family: var(--reading);
  font-size: 14px;
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 8px 14px;
  outline: none;
  background: var(--card);
  color: var(--text);
}
.ann-input:focus { border-color: var(--blue); }
.send-btn {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 4px;
  width: 38px;
  height: 38px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s;
}

/* ── Reader Nav ── */
.reader-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px 16px;
  flex-shrink: 0;
}
.nav-btn {
  font-family: var(--reading);
  font-size: 14px;
  background: none;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  padding: 4px 0;
}
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-page { font-size: 8px; }

/* ── Settings ── */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.settings-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 28px 24px;
  max-width: 400px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.settings-title { font-size: 10px; margin-bottom: 24px; color: var(--text); }
.settings-row { margin-bottom: 20px; }
.settings-label {
  font-family: var(--pixel);
  font-size: 8px;
  color: var(--text-light);
  margin-bottom: 8px;
  display: block;
}
.settings-name-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-emoji {
  font-size: 20px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
}
.settings-input {
  flex: 1;
  font-family: var(--reading);
  font-size: 14px;
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  outline: none;
  color: var(--text);
  background: var(--bg);
}
.settings-input:focus { border-color: var(--blue); }
.settings-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
.settings-done { width: 100%; margin-top: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="app.js"></script>
</body>
</html>
